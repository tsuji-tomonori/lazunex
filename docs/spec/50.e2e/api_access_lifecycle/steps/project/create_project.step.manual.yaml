schema_version: 1

step:
  id: create_project
  title: Project作成APIを呼び出す
  phase: exercise
  operation_id: createProject
  endpoint: POST /projects

md:
  detail_section:
    include: true
    heading: Project作成APIを呼び出す
    description: ${project.id}を作成し、projectId、API key、Cognito client IDを取得する。

prerequisites:
  - id: unique_project_code
    text: projectCode は case.id を含めて一意にする。
  - id: project_owner_exists
    text: ${project.defaults.ownerPrincipalId} がCognito上に存在する。

request:
  source: data.request

expect:
  response:
    status: ${result.expected_status}

capture:
  ${project.id}.projectId: $.projectId
  ${project.id}.projectApiKey: $.apiKey.apiKeyValue
  ${project.id}.publicClientId: $.cognito.publicClient.appClientId
  ${project.id}.confidentialClientId: $.cognito.confidentialClient.appClientId
