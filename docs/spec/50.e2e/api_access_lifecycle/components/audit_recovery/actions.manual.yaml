schema_version: 1

actions:
  - id: collect_audit
    title: 監査イベントを確認する
    operation_type: evidence
    default_result: recorded
    compatible_states:
      - recorded
      - trace_missing
    target:
      - project
      - api
    case_generation:
      as_goal: false
      use_as_evidence: true

  - id: retry_after_failure
    title: 失敗後に再試行する
    operation_type: command
    default_result: retryable
    compatible_states:
      - retryable
    target:
      - project
      - api
    case_generation:
      as_goal: true
