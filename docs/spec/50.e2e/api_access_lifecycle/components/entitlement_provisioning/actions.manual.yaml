schema_version: 1

actions:
  - id: provision_entitlement
    title: 承認結果を利用権へ反映する
    operation_type: side_effect
    default_result: provisioned
    target:
      - project
      - api
    triggered_by:
      component: review_decision
      action: approve_request
      state: approved

  - id: list_subscriptions
    title: Projectのsubscriptionを確認する
    operation_type: query
    default_result: listed
    target:
      - project
      - api
