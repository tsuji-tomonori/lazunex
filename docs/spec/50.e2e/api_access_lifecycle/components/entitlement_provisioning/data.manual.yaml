schema_version: 1

data_profiles:
  - id: approved_both_entitlement
    title: BOTH承認の利用権
    coverage_role: evidence_success
    compatible_actions:
      - provision_entitlement
      - list_subscriptions
    compatible_states:
      - provisioned
      - listed
      - partially_failed
    target_coverage: canonical_pair
    tags:
      - approved
      - both_auth_mode
    expected:
      subscriptionStatus: ACTIVE
      usagePlanStage: attached
      cognitoScope:
        publicClient: attached
        confidentialClient: attached

  - id: rejected_no_entitlement
    title: 却下後の利用権なし
    coverage_role: evidence_negative
    compatible_actions:
      - list_subscriptions
    compatible_states:
      - not_provisioned
    target_coverage: canonical_pair
    tags:
      - rejected
      - no_entitlement
    expected:
      subscriptionStatus: absent
      usagePlanStage: absent
      cognitoScope:
        publicClient: absent
        confidentialClient: absent
