schema_version: 1

data_profiles:
  - id: api_default
    title: 標準API
    coverage_role: canonical_success
    compatible_actions:
      - publish_api
      - browse_api
    compatible_states:
      - published
      - publish_failed
      - found
    target_coverage: all
    tags:
      - valid_api
      - has_stage
      - has_scope
      - has_reviewer
    request:
      body:
        apiCode: ${api.defaults.apiCode}
        name: ${api.defaults.name}
        description: ${api.defaults.description}
        providerPrincipalId: ${actors.provider_owner}
        reviewerPrincipalIds:
          - ${actors.reviewer}
        stages:
          - stageName: ${api.defaults.stageName}
            apiGatewayRestApiId: ${api.defaults.apiGatewayRestApiId}
            apiGatewayStageName: ${api.defaults.apiGatewayStageName}
        scopes:
          - scopeName: ${api.defaults.scopeName}
            displayName: ${api.defaults.scopeDisplayName}
            description: ${api.defaults.scopeDescription}

  - id: api_unknown
    title: 未登録API
    coverage_role: negative_cause
    compatible_actions:
      - browse_api
    compatible_states:
      - not_found
    target_coverage: canonical_api
    tags:
      - unknown_api
    request:
      path:
        apiId: api_unknown
