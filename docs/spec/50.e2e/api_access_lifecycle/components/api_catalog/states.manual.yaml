schema_version: 1

states:
  - id: published
    title: API公開成功
    continue_flow: true
    provides:
      variables:
        - ${api.id}.apiId
        - ${api.id}.apiStageId
        - ${api.id}.scopeFullName

  - id: publish_failed
    title: API公開失敗
    continue_flow: false

  - id: found
    title: API探索成功
    continue_flow: true

  - id: not_found
    title: API探索失敗
    continue_flow: false
