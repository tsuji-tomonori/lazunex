schema_version: 1

states:
  - id: submitted
    title: 申請成功
    continue_flow: true
    provides:
      variables:
        - accessRequestId[${project.id},${api.id}]

  - id: listed
    title: 申請一覧取得成功
    continue_flow: true

  - id: duplicate_pending_rejected
    title: 重複PENDING申請で失敗
    continue_flow: false

  - id: existing_subscription_rejected
    title: 既存subscriptionありで失敗
    continue_flow: false
