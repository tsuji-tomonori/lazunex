schema_version: 1

actions:
  - id: approve_request
    title: 利用申請を承認する
    operation_type: command
    default_result: approved
    compatible_states:
      - approved
      - forbidden
      - not_pending
    target:
      - project
      - api
    requires:
      component_states:
        access_request_workflow:
          state: submitted

  - id: reject_request
    title: 利用申請を却下する
    operation_type: command
    default_result: rejected
    compatible_states:
      - rejected
      - forbidden
      - not_pending
    target:
      - project
      - api
    requires:
      component_states:
        access_request_workflow:
          state: submitted
