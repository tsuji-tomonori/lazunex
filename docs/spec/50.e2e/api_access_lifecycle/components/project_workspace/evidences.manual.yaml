schema_version: 1

evidences:
  - id: project_search_hit
    title: プロジェクト検索でヒットする
    collector:
      step: steps/management_api/list_projects.step.manual.yaml
      bind:
        keyword: ${project.defaults.projectCode}
    ok_condition: ${project.id} が検索結果に表示され、derivedState=ACTIVEである。
    save_as: ${case.id}_E_project_search_${project.id}.json

  - id: redirect_url_updated
    title: CognitoのリダイレクトURLが更新されている
    collector:
      step: steps/management_api/get_project.step.manual.yaml
    ok_condition: callbackUrls に callback-updated が含まれる。
    save_as: ${case.id}_E_project_redirect_url_${project.id}.json

  - id: secret_not_redisplayed
    title: secret値が再表示されない
    collector:
      step: steps/management_api/get_project.step.manual.yaml
    ok_condition: API key値とclient secret値がレスポンスに含まれない。
    save_as: ${case.id}_E_project_secret_mask_${project.id}.json

  - id: project_provision_failed_response
    title: Project作成失敗レスポンスを確認する
    collector:
      step: steps/management_api/create_project.step.manual.yaml
    ok_condition: Project作成が失敗し、原因を示すHTTP status/bodyを返す。
    save_as: ${case.id}_E_project_provision_failed_${project.id}.json

  - id: public_client_update_failed_response
    title: public app client更新失敗レスポンスを確認する
    collector:
      step: steps/management_api/update_project_public_client.step.manual.yaml
    ok_condition: public app client更新が失敗し、原因を示すHTTP status/bodyを返す。
    save_as: ${case.id}_E_project_public_client_update_failed_${project.id}.json
