schema_version: 1

states:
  - id: provisioned
    title: Project作成成功
    continue_flow: true
    provides:
      variables:
        - ${project.id}.projectId
        - ${project.id}.projectApiKey
        - ${project.id}.publicClientId
        - ${project.id}.confidentialClientId

  - id: provision_failed
    title: Project作成失敗
    continue_flow: false

  - id: public_client_updated
    title: public app client更新成功
    continue_flow: true

  - id: public_client_update_failed
    title: public app client更新失敗
    continue_flow: false
