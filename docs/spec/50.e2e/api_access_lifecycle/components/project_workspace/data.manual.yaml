schema_version: 1

data_profiles:
  - id: project_default
    title: 標準Project
    coverage_role: canonical_success
    compatible_actions:
      - create_project
    compatible_states:
      - provisioned
      - provision_failed
    target_coverage: all
    tags:
      - valid_project
      - has_public_client
      - has_confidential_client
    request:
      body:
        projectCode: ${project.defaults.projectCode}
        name: ${project.defaults.name}
        ownerPrincipalId: ${project.defaults.ownerPrincipalId}
        departmentCode: ${project.defaults.departmentCode}

  - id: redirect_url_update
    title: callback URL更新
    coverage_role: canonical_success
    compatible_actions:
      - update_public_client
    compatible_states:
      - public_client_updated
      - public_client_update_failed
    target_coverage: canonical_project
    tags:
      - valid_public_client_update
    request:
      path:
        projectId: ${project.id}.projectId
      body:
        callbackUrls:
          - https://example.com/${project.id}/callback
          - https://example.com/${project.id}/callback-updated
        logoutUrls:
          - https://example.com/${project.id}/logout
