schema_version: 1
template:
  id: post_apis
  operation_id: publishApi
  method: POST
  path: /apis
request:
  headers:
    Authorization: Bearer ${tokens.provider_management_token}
    Idempotency-Key: ${case.case_id}-publish-api
    Content-Type: application/json
  body:
    from_sample:
      module: app.apis.apis.publish_api.samples
      object: PUBLISH_API_REQUEST_SAMPLE
captures:
  apiId: $.apiId
  apiStageId: $.apiStageId
  scopeFullName: $.scope.scopeFullName
