schema_version: 1

evidence:
  id: current_api_callable
  title: 承認済みAPIが呼び出せる
  category: runtime_authorization

applies_to:
  factor: review
  operation: approve
  result: success

targets:
  api: current

timing:
  after_step: approve_access_request

collector:
  step:
    id: invoke_current_api
    ref: steps/runtime/invoke_api.step.manual.yaml
    expect:
      status_family: 2xx

md:
  evidence_row:
    viewpoint: 承認済みAPI実行確認
    timing: 承認API呼び出し後
    evidence: ${api.id} Runtime APIレスポンス
    collection: GET ${api.defaults.invokeUrl}
    ok_condition: ${api.id} が2xxを返す。
    save_as: ${case.id}_E_runtime_${project.id}_${api.id}_allowed.json
