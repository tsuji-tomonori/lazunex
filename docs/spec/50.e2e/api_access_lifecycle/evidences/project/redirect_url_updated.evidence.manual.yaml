schema_version: 1

evidence:
  id: redirect_url_updated
  title: public client redirect URLが更新される
  category: state_confirmation

applies_to:
  factor: project
  operation: update
  result: success

timing:
  after_step: update_project_public_client

collector:
  step:
    id: collect_project_detail
    operation_id: getProject
    method: GET
    endpoint: /projects/{projectId}
    expect:
      status: 200

md:
  evidence_row:
    viewpoint: public client更新確認
    timing: Project public client更新API呼び出し後
    evidence: GET /projects/{projectId} のレスポンス
    collection: GET /projects/{projectId}
    ok_condition: callback/logout URLが更新され、承認済みscopeが保持されている。
    save_as: ${case.id}_E_project_public_client_${project.id}.json
