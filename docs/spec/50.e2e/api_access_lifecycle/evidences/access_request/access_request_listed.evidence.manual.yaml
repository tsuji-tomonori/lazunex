schema_version: 1

evidence:
  id: access_request_listed
  title: 利用申請一覧に表示される
  category: state_confirmation

applies_to:
  factor: access_request
  operation: apply
  result: success

timing:
  after_step: create_access_request

collector:
  step:
    id: collect_access_request_list
    operation_id: listProjectApiAccessRequests
    method: GET
    endpoint: /projects/{projectId}/api-access-requests
    request:
      path:
        projectId: ${project.projectId}
    expect:
      status: 200
      body:
        items:
          contains:
            accessRequestId: ${accessRequestId[${project.id},${api.id}]}
            apiId: ${api.apiId}
            derivedState: PENDING

md:
  evidence_row:
    viewpoint: 利用申請作成確認
    timing: 利用申請API呼び出し後
    evidence: GET /projects/{projectId}/api-access-requests のレスポンス
    collection: GET /projects/{projectId}/api-access-requests
    ok_condition: ${project.id} × ${api.id} の利用申請がPENDINGで表示される。
    save_as: ${case.id}_E_access_request_pending_${project.id}_${api.id}.json
