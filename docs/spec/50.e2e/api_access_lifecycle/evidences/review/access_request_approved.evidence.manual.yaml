schema_version: 1

evidence:
  id: access_request_approved
  title: 利用申請一覧で承認として確認できる
  category: state_confirmation

applies_to:
  factor: review
  operation: approve
  result: success

timing:
  after_step: approve_access_request

collector:
  step:
    id: collect_access_request_approved
    operation_id: listProjectApiAccessRequests
    method: GET
    endpoint: /projects/{projectId}/api-access-requests
    expect:
      status: 200
      body:
        items:
          contains:
            accessRequestId: ${accessRequestId[${project.id},${api.id}]}
            apiId: ${api.apiId}
            derivedState: APPROVED

md:
  evidence_row:
    viewpoint: 承認結果確認
    timing: 承認API呼び出し後
    evidence: GET /projects/{projectId}/api-access-requests のレスポンス
    collection: GET /projects/{projectId}/api-access-requests
    ok_condition: ${project.id} × ${api.id} の利用申請がAPPROVEDで表示される。
    save_as: ${case.id}_E_access_request_approved_${project.id}_${api.id}.json
