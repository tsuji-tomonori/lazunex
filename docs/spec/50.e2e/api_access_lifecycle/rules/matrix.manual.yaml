schema_version: 1

variant_generation:
  compatibility:
    require_action_state_compatibility: true
    require_data_action_compatibility: true
    require_data_state_compatibility: true
    require_tag_compatibility: true

  data_policy:
    success_variations_only_on_success_state: true
    negative_data_only_on_matching_failure_state: true
    evidence_data_not_standalone_goal: true

  target_policy:
    default: canonical_pair
    canonical_project: project_A
    canonical_api: API_A
    all_targets_for:
      - component: access_request_workflow
        action: submit_request
        state: submitted
        data:
          - request_both_auth
      - component: review_decision
        action: approve_request
        state: approved
      - component: runtime_authorization
        state:
          - allowed
          - denied

  dimensions:
    project:
      targets: all
      operations: all
      results: all
      data: compatible
    access_request:
      projects: all
      apis: all
      operations: all
      results: all
      data: compatible
    review:
      projects: all
      apis: all
      operations: all
      results: all
      data: compatible

component_variant_generation:
  dimensions:
    api_catalog:
      api: all
      action: all
      state: all
      data: compatible
    project_workspace:
      project: all
      action: all
      state: all
      data: compatible
    access_request_workflow:
      project: all
      api: all
      action: all
      state: all
      data: compatible
    review_decision:
      project: all
      api: all
      action:
        - approve_request
        - reject_request
      state: all
      data: compatible
    entitlement_provisioning:
      project: all
      api: all
      action: all
      state: all
      data: compatible
    runtime_authorization:
      project: all
      api: all
      action: all
      state: all
      data: compatible
    audit_recovery:
      project: all
      api: all
      action: representative
      state: all
      data: representative

component_case_generation:
  default_strategy: component_variant_coverage
  strategies:
    - id: smoke
      enabled: true
      strategy: curated_goals
      description: 代表的な成功・失敗だけを出すsmoke向けケース。
      output_group: smoke

    - id: component_variant_coverage
      enabled: true
      strategy: additive
      description: 各component variantを最低1ケースのゴールにする。
      output_group: component_variant
      include:
        components: all
        project: all
        api: all
        action: all
        state: all
        data: compatible
      one_case_per_variant: true

    - id: interaction_coverage
      enabled: true
      strategy: pairwise
      description: 認証モードとRuntime資格情報など、重要な組み合わせだけを追加する。
      output_group: interaction
      groups:
        - id: auth_mode_runtime
          dimensions:
            - review_decision.data.approvedAuthMode
            - runtime_authorization.data.credential_kind
        - id: public_client_update_after_approval
          dimensions:
            - review_decision.data.approvedAuthMode
            - project_workspace.action.update_public_client

pruning:
  stop_when_continue_flow_false: true
  remove_unreachable_dependencies: true
  drop_query_goal_cases: true
  drop_evidence_only_goal_cases: true
  dedupe_same_goal_and_same_evidence: true
  dedupe_same_behavior_signature: true

dedupe:
  behavior_signature:
    - component
    - action
    - state
    - data.coverage_role
    - expected_status
    - expected_business_state
    - evidence_ids

coverage_assertions:
  - id: all_component_variants_are_covered
    type: every_variant_has_case
    components: all

  - id: every_project_is_covered
    type: every_target_has_case
    target_type: project

  - id: every_api_is_covered
    type: every_target_has_case
    target_type: api

  - id: every_runtime_state_is_covered
    type: every_state_has_case
    component: runtime_authorization
