target_cases:
  - id: TC_TARGET_001
    title: project_AでAPI_A利用申請を作成し承認する
    selected_variants:
      - project.project_A.create.success@create_default
      - access_request.project_A.API_A.apply.success@both_auth_mode
      - review.project_A.API_A.approve.success@approve_both
    runtime_assertions:
      - project: project_A
        api: API_A
        expected: allowed
      - project: project_A
        api: API_B
        expected: denied
      - project: project_A
        api: API_C
        expected: denied
  - id: TC_TARGET_002
    title: project_AでAPI_A利用申請を作成し却下する
    selected_variants:
      - project.project_A.create.success@create_default
      - access_request.project_A.API_A.apply.success@both_auth_mode
      - review.project_A.API_A.reject.success@reject_default
    runtime_assertions:
      - project: project_A
        api: API_A
        expected: denied
      - project: project_A
        api: API_B
        expected: denied
      - project: project_A
        api: API_C
        expected: denied
  - id: TC_TARGET_003
    title: project_Aのpublic client redirect URLを更新する
    selected_variants:
      - project.project_A.create.success@create_default
      - project.project_A.update.success@update_redirect_url
