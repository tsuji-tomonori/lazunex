# This file is maintained manually.
schema_version: 1
flow: api_access_lifecycle
factors:
  - id: F000
    slug: health_check_result
    title: "GET /health ヘルスチェック結果"
    owner_step: get_health
    elements:
      - success # default
      - unavailable # terminal
  - id: F001
    slug: management_actor
    title: "管理API呼び出し主体"
    owner_step: management_api
    elements:
      - provider_owner_reviewer # default
      - non_reviewer # terminal
  - id: F002
    slug: management_auth
    title: "管理API認証"
    owner_step: management_api
    elements:
      - valid # default
      - missing # terminal
  - id: F010
    slug: publish_api_result
    title: "POST /apis API公開結果"
    owner_step: post_apis
    elements:
      - success # default
      - duplicate_api_code # terminal
      - apigw_stage_invalid # terminal
      - cognito_scope_failed # terminal
  - id: F011
    slug: list_apis_result
    title: "GET /apis API一覧取得結果"
    owner_step: get_apis
    elements:
      - success # default
      - filter_no_match # terminal
  - id: F012
    slug: get_api_result
    title: "GET /apis/{apiId} API詳細取得結果"
    owner_step: get_api
    elements:
      - success # default
      - not_found # terminal
  - id: F020
    slug: create_project_result
    title: "POST /projects Project作成結果"
    owner_step: post_projects
    elements:
      - success # default
      - duplicate_project_code # terminal
  - id: F021
    slug: list_projects_result
    title: "GET /projects Project一覧取得結果"
    owner_step: get_projects
    elements:
      - success # default
      - filter_no_match # terminal
  - id: F022
    slug: get_project_result
    title: "GET /projects/{projectId} Project詳細取得結果"
    owner_step: get_project
    elements:
      - success # default
      - not_found # terminal
  - id: F023
    slug: update_project_public_client_result
    title: "PATCH /projects/{projectId}/public-client 更新結果"
    owner_step: patch_project_public_client
    elements:
      - success # default
      - invalid_redirect_uri # terminal
  - id: F030
    slug: access_request_result
    title: "POST /projects/{projectId}/api-access-requests 利用申請作成結果"
    owner_step: post_api_access_requests
    elements:
      - success # default
      - duplicate_pending # terminal
      - already_subscribed # terminal
  - id: F031
    slug: list_project_api_access_requests_result
    title: "GET /projects/{projectId}/api-access-requests 利用申請一覧取得結果"
    owner_step: get_project_api_access_requests
    elements:
      - success # default
      - unauthorized_project # terminal
  - id: F040
    slug: approve_api_access_request_result
    title: "POST /api-access-requests/{accessRequestId}/approve 承認結果"
    owner_step: approve_api_access_request
    elements:
      - success # default
      - non_reviewer # terminal
      - not_pending # terminal
  - id: F041
    slug: reject_api_access_request_result
    title: "POST /api-access-requests/{accessRequestId}/reject 却下結果"
    owner_step: reject_api_access_request
    elements:
      - success # default
      - non_reviewer # terminal
  - id: F050
    slug: approve_provisioning_result
    title: "承認時provisioning"
    owner_step: approve_api_access_request
    elements:
      - apigw_success_cognito_success # default
      - apigw_success_cognito_failed # terminal
      - retry_after_partial_failure
  - id: F061
    slug: list_project_subscriptions_result
    title: "GET /projects/{projectId}/subscriptions Subscription一覧取得結果"
    owner_step: get_project_subscriptions
    elements:
      - success # default
      - none_after_reject # terminal
  - id: F070
    slug: runtime_credential
    title: "Runtime credentials"
    owner_step: invoke_runtime_api
    elements:
      - valid_token_valid_api_key # default
      - scope_missing
      - api_key_missing
